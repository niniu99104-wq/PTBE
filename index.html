<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DouDou 代理匯款回報系統</title>
    <style>
        /* 整體風格：延續簡潔、溫暖、生活感 */
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: #fdfaf6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #4e342e;
        }
        .container {
            background: #fff;
            padding: 35px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box;
            position: relative;
        }
        h2 {
            text-align: center;
            color: #8d6e63;
            letter-spacing: 2px;
            margin-bottom: 30px;
            margin-top: 0;
            line-height: 1.4;
        }
        label {
            display: block;
            font-size: 15px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        select, input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 2px solid #d7ccc8;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            color: #4e342e;
            background: #fff;
            cursor: pointer;
        }
        button.main-btn {
            width: 100%;
            padding: 16px;
            background: #8d6e63;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
            letter-spacing: 1px;
            transition: 0.2s;
        }
        button.main-btn:hover {
            background: #6d4c41;
        }
        #resultArea {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: #f5f0eb;
            border-radius: 16px;
            border-left: 6px solid #8d6e63;
        }
        #outputText {
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.6;
            color: #5d4037;
            font-weight: 500;
        }
        .copy-btn {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #fff;
            border: 2px solid #d7ccc8;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #8d6e63;
            font-size: 15px;
        }
        /* Loading 遮罩 */
        #loadingOverlay {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            border-radius: 20px;
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loadingOverlay">
        <div style="font-size:24px; margin-bottom:10px;">⏳</div>
        <div style="font-weight:bold; color:#8d6e63;">資料同步中...</div>
    </div>

    <h2>🥜 DouDou. <br>代理匯款回報系統</h2>
    
    <label>代理編號</label>
    <select id="agentSelect">
        <option value="">-- 點擊選擇編號 --</option>
    </select>

    <label>匯款日期</label>
    <select id="dateSelect"></select>

    <label>儲值金額 (TWD)</label>
    <select id="amountInput">
        <option value="">-- 請選擇匯款金額 --</option>
    </select>

    <label>備註 (帳號末五碼)</label>
    <input id="noteInput" type="text" placeholder="例如：12345">

    <button class="main-btn" onclick="processData()">一鍵產出並紀錄</button>

    <div id="resultArea">
        <div id="outputText"></div>
        <button class="copy-btn" onclick="copyToClipboard()">📋 點擊複製回報文案</button>
    </div>
    
    <div style="margin-top:40px; font-size:13px; color:#a1887f; text-align:center; line-height:1.8; font-weight:bold;">
        不賣焦慮，不走捷徑。<br>只選真正重要的事情做。
    </div>
</div>

<script>
    // 1. 設定 Google Apps Script 通道網址
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtocFv4v1vZYCEu8m1FKiYtsgmf3-3kzl1A9E1U8lzmt_jrh5kItgtpilDm8HnbOKY7g/exec';

    // 2. 自動生成代理編號 (001-021)
    const agentSelect = document.getElementById('agentSelect');
    for(let i=1; i<=21; i++) {
        let num = i.toString().padStart(3, '0');
        let opt = document.createElement('option');
        opt.value = `doudou${num}`;
        opt.innerText = `doudou${num}`;
        agentSelect.appendChild(opt);
    }

    // 3. 自動生成最近 7 天日期
    const dateDropdown = document.getElementById('dateSelect');
    const today = new Date();
    for(let i=0; i<7; i++) {
        let d = new Date(today);
        d.setDate(today.getDate() - i);
        let yyyy = d.getFullYear();
        let mm = String(d.getMonth() + 1).padStart(2, '0');
        let dd = String(d.getDate()).padStart(2, '0');
        let dateString = `${yyyy}/${mm}/${dd}`;
        let opt = document.createElement('option');
        opt.value = dateString;
        opt.innerText = (i === 0) ? `${dateString} (今天)` : (i === 1) ? `${dateString} (昨天)` : dateString;
        dateDropdown.appendChild(opt);
    }

    // ★ 4. 自動生成金額選單 (2000 到 20000，間距 1000) ★
    const amountSelect = document.getElementById('amountInput');
    for(let i = 2000; i <= 20000; i += 1000) {
        let opt = document.createElement('option');
        opt.value = i; // 實際傳給 Google 的數字
        opt.innerText = `NT$ ${i.toLocaleString()}`; // 畫面上看到的千分位格式
        amountSelect.appendChild(opt);
    }

    // 5. 核心處理函數
    function processData() {
        const agent = document.getElementById('agentSelect').value;
        const remitDate = document.getElementById('dateSelect').value;
        const amount = document.getElementById('amountInput').value;
        const note = document.getElementById('noteInput').value;

        if(!agent) return alert('親愛的，選個代理編號再按送出。');
        if(!amount) return alert('儲值金額總不能是空的吧，請選擇金額。');
        if(!note) return alert('請填寫帳號末五碼，方便小幫手對帳喔！');

        document.getElementById('loadingOverlay').style.display = 'flex';

        const payload = {
            date: remitDate,
            agent: agent,
            amount: amount,
            note: note
        };

        // 送出資料到 Google Sheet
        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(() => {
            document.getElementById('loadingOverlay').style.display = 'none';
            generateTextContent(agent, remitDate, amount, note);
            alert('同步成功！請記得「點擊下方按鈕」複製文案，並回傳給闆娘喔！✨');
        })
        .catch(error => {
            document.getElementById('loadingOverlay').style.display = 'none';
            generateTextContent(agent, remitDate, amount, note);
            alert('同步至試算表稍有延遲，但文案已產出，請記得複製回傳。');
        });
    }

    // 6. 產出代理回報文案
    function generateTextContent(agent, remitDate, amount, note) {
        let formattedAmount = Number(amount).toLocaleString();
        let finalString = `🥜 DouDou. 匯款回報單 🥜\n\n闆娘，我已完成儲值匯款囉！\n----------------------\n● 代理編號：${agent}\n● 匯款日期：${remitDate}\n● 匯款金額：NT$ ${formattedAmount}\n● 帳號末五碼：${note}\n----------------------\n請記得將此訊息【截圖】或【複製】回傳給闆娘核對喔！✨`;
        
        document.getElementById('outputText').innerText = finalString;
        document.getElementById('resultArea').style.display = 'block';
    }

    // 7. 複製功能
    function copyToClipboard() {
        const textToCopy = document.getElementById('outputText').innerText;
        navigator.clipboard.writeText(textToCopy).then(() => {
            alert('文案複製成功！快去貼給DouDou吧～');
        });
    }
</script>

</body>
</html>
